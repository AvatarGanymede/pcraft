# Internal workflow TEMPLATE definition — NOT the portable import/export format.
# Steps here reference each other by string `step_id`; the importable YAML uses a
# `version`/`type`/`workflows` envelope and `step_position`. Don't paste this file
# (or its `step_id` transitions) into the workflow import endpoint.
# Format reference: docs/workflow-import-export.md
id: simple
name: Kanban
description: >-
  Four-state task board: Backlog → In Progress → Done → Closed.
  Tasks start in Backlog, move to In Progress when the agent runs,
  advance to Done when the pipeline completes, and reach Closed
  after P4 submit confirmation.

steps:
  - id: backlog
    name: Backlog
    position: 0
    color: bg-neutral-400
    allow_manual_move: true
    events:
      on_turn_start:
        - type: move_to_next

  - id: in-progress
    name: In Progress
    position: 1
    color: bg-blue-500
    is_start_step: true
    show_in_command_panel: true
    allow_manual_move: true
    events:
      on_enter:
        - type: auto_start_agent
      on_turn_complete:
        - type: move_to_step
          config:
            step_id: done

  - id: done
    name: Done
    position: 2
    color: bg-green-500
    show_in_command_panel: true
    allow_manual_move: true
    events:
      on_turn_start:
        - type: move_to_previous

  - id: closed
    name: Closed
    position: 3
    color: bg-purple-500
    allow_manual_move: true
